<!DOCTYPE html>
<html>
<head>
<title>LaxVault Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-blue-500">

<div class="backdrop-blur-xl bg-white/20 border border-white/30 p-10 rounded-2xl shadow-2xl w-96">

<h1 class="text-3xl font-bold text-white text-center mb-2">
LaxVault
</h1>

<p class="text-center text-gray-200 mb-6">
Secure Legal Case Platform
</p>

<form method="POST" action="/login">

<input type="email" name="email"
placeholder="Email"
class="w-full mb-3 px-4 py-2 rounded-lg bg-white/80 outline-none">

<input type="password" name="password"
placeholder="Password"
class="w-full mb-3 px-4 py-2 rounded-lg bg-white/80 outline-none">

<select name="role"
class="w-full mb-4 px-4 py-2 rounded-lg bg-white/80">

<option value="client">Client</option>
<option value="lawyer">Lawyer</option>
<option value="admin">Admin</option>

</select>

<button
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition">

Login

</button>

</form>

<p class="text-center text-sm text-gray-200 mt-4">
Don't have an account?
<a href="/signup" class="underline">Sign up</a>
</p>

</div>

</body>

</html>
