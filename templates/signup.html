<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LaxVault Signup</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Animations -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-blue-500">

<div class="animate__animated animate__fadeInUp backdrop-blur-lg bg-white/20 border border-white/30 p-10 rounded-2xl shadow-2xl w-96">

<h1 class="text-3xl font-bold text-white text-center mb-2">
LaxVault
</h1>

<p class="text-center text-gray-200 mb-6">
Create Your Secure Account
</p>

<form method="POST" action="/signup">

<input
type="text"
name="name"
placeholder="Full Name"
required
class="w-full mb-3 px-4 py-2 rounded-lg bg-white/80 outline-none">

<input
type="email"
name="email"
placeholder="Email"
required
class="w-full mb-3 px-4 py-2 rounded-lg bg-white/80 outline-none">

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full mb-3 px-4 py-2 rounded-lg bg-white/80 outline-none">

<select
name="role"
class="w-full mb-4 px-4 py-2 rounded-lg bg-white/80">

<option value="client">Client</option>
<option value="lawyer">Lawyer</option>

</select>

<button
class="w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg transition duration-300">
Create Account
</button>

</form>

<p class="text-center text-sm text-gray-200 mt-4">
Already have an account?
<a href="/" class="underline">Login</a>
</p>

</div>

</body>
</html>
