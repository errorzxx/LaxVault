<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 shadow rounded w-96">

<h2 class="text-xl font-bold mb-4">Submit Your Case</h2>

<form action="/submit_case" method="POST">

<input type="hidden" name="lawyer_id" value="{{ lawyer_id }}">

<textarea
name="case_details"
class="w-full border p-2 mb-4"
placeholder="Describe your legal case"></textarea>

<button
class="bg-green-600 text-white px-4 py-2 rounded w-full">

Submit Case

</button>

</form>

</div>

</body>
</html>
